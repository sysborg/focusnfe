name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint (Pint)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Run tests with coverage
        run: |
          vendor/bin/phpunit --coverage-text --colors=always | tee coverage.txt
          COVERAGE=$(grep -Eo 'Lines:\s+[0-9]+\.[0-9]+%' coverage.txt | head -n 1 | grep -Eo '[0-9]+\.[0-9]+')
          if [ -z "$COVERAGE" ]; then
            echo "Nao foi possivel extrair a cobertura de linhas do relatório."
            exit 1
          fi
          awk -v coverage="$COVERAGE" 'BEGIN { if (coverage + 0 < 80) exit 1 }'

      - name: Assert minimum coverage
        run: echo "Cobertura minima de 80% validada no CI."
